# config/config.example.yaml
irc:
  server: "irc.example.com"
  port: 6697
  ssl: true
  nickname: "Relayarr"
  channels:
    - "#requests"
  command_prefix: "!"

auth:
  admins:
    - "*!*@admin.host.mask"
  users:
    - "*!*@*.trusted.network"
  default_role: "none"

overseerr:
  url: "http://overseerr:5055"
  api_key: "${OVERSEERR_API_KEY}"

lidarr:
  url: "http://lidarr:8686"
  api_key: "${LIDARR_API_KEY}"
  quality_profile_id: 1
  metadata_profile_id: 1
  root_folder_path: "/music"

plex:
  url: "http://plex:32400"
  token: "${PLEX_TOKEN}"
  announce_channel: "#media"
  announce_interval: 300

# tautulli:
#   url: "http://tautulli:8181"
#   api_key: "${TAUTULLI_API_KEY}"

romm:
  url: "http://romm:8080"
  username: "admin"
  password: "${ROMM_PASSWORD}"
  domain: "https://romm.example.com"
  igdb_client_id: "${IGDB_CLIENT_ID}"
  igdb_client_secret: "${IGDB_CLIENT_SECRET}"
  notifications:
    enabled: false
    channel: "#romm"
    interval: 300

shelfmark:
  url: "http://shelfmark:8080"
  username: "bot_user"
  password: "${SHELFMARK_PASSWORD}"

plugins:
  enabled:
    - overseerr
    # - lidarr
    # - romm
    # - shelfmark

database:
  path: "/data/bot.db"

session:
  timeout_seconds: 300

formatting:
  irc_colors: true

web:
  port: 9090
